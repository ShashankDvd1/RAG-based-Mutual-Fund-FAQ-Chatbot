name: Daily RAG Data Ingestion

on:
  schedule:
    # Run every day at midnight UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for committing changes

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run data ingestion pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        VECTORSTORE_PATH: ./backend/data/vectorstore
        EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      run: |
        python backend/ingestion/run_ingestion.py

    - name: Commit and push updated vectorstore
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if vectorstore files changed
        git add backend/data/vectorstore/
        if git diff --cached --quiet; then
          echo "No changes in vectorstore. Skipping push."
        else
          git commit -m "chore: auto-update FAISS vectorstore [skip ci]"
          git push origin main
        fi
